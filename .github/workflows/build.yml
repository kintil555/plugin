name: Build & Release Plugin

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Plugin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -B --no-transfer-progress

      - name: Get Plugin Version
        id: get_version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RandomSkillPlugin-${{ steps.get_version.outputs.version }}
          path: target/RandomSkillPlugin-*.jar
          if-no-files-found: error

      # Auto Release saat push tag v* (contoh: git tag v1.0.0 && git push --tags)
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: target/RandomSkillPlugin-*.jar
          name: RandomSkillPlugin ${{ github.ref_name }}
          body: |
            ## 🎮 RandomSkillPlugin ${{ github.ref_name }}
            Plugin skill random untuk Paper 1.21.11

            ### ✨ Cara Install
            1. Download file `.jar` di bawah
            2. Taruh di folder `plugins/` server
            3. Restart server

            ### 🎯 Commands
            - `/skill` - lihat skill aktif
            - `/skill use` - gunakan skill
            - `/select <player>` - pilih target untuk skill berbasis player
            - `/skillreload` - reload config (op)
